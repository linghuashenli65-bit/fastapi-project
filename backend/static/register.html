<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 学生管理系统</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* 注册页面专用样式 */
    .register-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .register-box {
      background: white;
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .register-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .register-header h1 {
      font-size: 1.8rem;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    .register-header p {
      color: #64748b;
      font-size: 0.95rem;
    }

    .register-form .form-group {
      margin-bottom: 1.25rem;
      display: block;
    }

    .register-form label {
      display: block;
      margin-bottom: 0.5rem;
      color: #374151;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .register-form input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .register-form input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .register-form input::placeholder {
      color: #9ca3af;
    }

    .register-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .register-btn.loading {
      position: relative;
      color: transparent;
    }

    .register-btn.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin-left: -10px;
      margin-top: -10px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spinner 0.8s linear infinite;
    }

    @keyframes spinner {
      to { transform: rotate(360deg); }
    }

    .register-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .register-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #f0fdf4;
      color: #16a34a;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .logo-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-box">
      <div class="register-header">
        <div class="logo-icon">📚</div>
        <h1>学生管理系统</h1>
        <p>创建新账户</p>
      </div>

      <div id="error-msg" class="error-message"></div>
      <div id="success-msg" class="success-message"></div>

      <form class="register-form" id="register-form">
        <div class="form-group">
          <label for="email">邮箱 *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="请输入邮箱"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">密码 *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="请输入密码（至少6位）"
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label for="username">用户名</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="请输入用户名"
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="full_name">姓名</label>
          <input 
            type="text" 
            id="full_name" 
            name="full_name" 
            placeholder="请输入真实姓名"
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="phone">手机号</label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="请输入手机号"
            autocomplete="tel"
          >
        </div>

        <button type="submit" class="register-btn" id="register-btn">
          注册
        </button>
      </form>

      <div class="register-footer">
        <p>已有账户？<a href="/static/login.html">立即登录</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/register.js"></script>
</body>
</html>
